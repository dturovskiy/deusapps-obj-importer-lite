name: Build RBZ

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build RBZ
        run: python scripts/build_rbz.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deusapps-blender-obj-importer-lite-rbz
          path: dist/*.rbz
